<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خزانة قلبي  ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #720e1d, #2e040a, #42060f, #720e1d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            color: #fff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* حاوية الزجاج - مطابقة للصفحة الأولى */
        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 550px;
            transition: all 0.5s ease;
        }

        h2 {
            color: #ff4d6d;
            margin-bottom: 30px;
            font-size: 1.8rem;
            text-shadow: 0 2px 10px rgba(255, 77, 109, 0.5);
        }

        .input-group {
            margin-bottom: 25px;
            text-align: right;
        }

        label {
            display: block;
            color: #fce1e4;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            padding-right: 10px;
        }

        /* تنسيق شفاف وناعم لحقل الرسالة */
        textarea {
            width: 100%;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s ease;
            height: 180px;
            resize: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        textarea::placeholder {
            color: rgba(252, 225, 228, 0.5);
        }

        textarea:focus {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 77, 109, 0.5);
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.2);
        }

        /* تنسيق زر رفع الصورة بالكامل ليكون جميلاً */
        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 55px;
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .file-upload-wrapper:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* الزر الشفاف الذي يضغط عليه */
        .file-upload-input {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        /* النص الظاهر في زر الرفع */
        .file-upload-label {
            padding: 0 20px;
            color: rgba(252, 225, 228, 0.7);
            font-weight: 500;
            flex-grow: 1;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            text-align: right;
        }

        /* "ايقونة" أو مربع "اختر صورة" */
        .file-upload-button {
            background-color: rgba(255, 77, 109, 0.1);
            color: #ff4d6d;
            height: 100%;
            padding: 0 25px;
            display: flex;
            align-items: center;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .file-upload-input:hover + .file-upload-button {
            background-color: rgba(255, 77, 109, 0.2);
        }

        /* زر الإرسال الكريستالي */
        .submit-btn {
            background: linear-gradient(45deg, #ff4d6d, #ff2a55);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.3rem;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.5);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            box-shadow: 0 15px 40px rgba(255, 77, 109, 0.8);
            transform: translateY(-3px);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="glass-box">
        <h2>درس تعبير، عبري و قولي مشاعرك يا روحي حتى لو مستحية✨</h2>

        <form action="https://formsubmit.co/abdlhmeedalgain@gmail.com" method="POST" enctype="multipart/form-data">
            
            <div class="input-group">
                <label for="message">رسالة منك</label>
                <textarea id="message" name="الرسالة" placeholder="ابي كلام من جوة قلبك" required></textarea>
            </div>

            <div class="input-group">
                <label>بشوف الخاتم على يدك و بسجلها هنا في الموقع كذكرى</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="photo" name="الصورة" accept="image/*" class="file-upload-input" onchange="updateFileName(this)">
                    <div class="file-upload-label" id="file-name">الصورة</div>
                    <div class="file-upload-button">اخيتار</div>
                </div>
            </div>

            <button type="submit" class="submit-btn">خزنيها و ارسليها بقلبي  💌</button>
        </form>
    </div>

    <script>
        // دالة لإظهار اسم الصورة بعد اختيارها
        function updateFileName(input) {
            const fileNameDisplay = document.getElementById('file-name');
            if (input.files && input.files.length > 0) {
                fileNameDisplay.textContent = input.files[0].name;
                fileNameDisplay.style.color = "#fff"; // تبييض اسم الملف عند الاختيار
            } else {
                fileNameDisplay.textContent = "لم يتم اختيار صورة بعد...";
                fileNameDisplay.style.color = "rgba(252, 225, 228, 0.7)";
            }
        }
    </script>

</body>
</html>
